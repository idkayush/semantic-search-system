version: '3.8'

services:
  semantic-search-api:
    build:
      context: .
      dockerfile: Dockerfile
    
    container_name: semantic-search-api
    
    ports:
      - "8000:8000"
    
    volumes:
      # Mount data directories for persistence
      - ./data:/app/data
      - ./models:/app/models
      - ./cache:/app/cache
    
    environment:
      - PYTHONUNBUFFERED=1
    
    restart: unless-stopped
    
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

networks:
  default:
    name: semantic-search-network
